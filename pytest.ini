[pytest]
testpaths = tests
asyncio_mode = strict
# Los tests de integración crean/usan la BD `tasas_test` en el Postgres local (:5433) y se
# saltan solos si no hay Postgres. Configurable con TEST_DATABASE_URL / TEST_ADMIN_DATABASE_URL.
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
    ignore::pydantic.warnings.PydanticDeprecatedSince20
